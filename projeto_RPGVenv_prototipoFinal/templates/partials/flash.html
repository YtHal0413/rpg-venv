<!-- partials/flash.html -->
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div id="flash-container" class="fixed top-20 right-4 z-50 flex flex-col gap-3 max-w-sm w-full">
            {% for category, message in messages %}
                <div class="flash-message relative bg-purple-950/90 border rounded-xl p-4 backdrop-blur-md shadow-2xl overflow-hidden
                    {% if category == 'sucesso' %}border-emerald-500/30{% elif category == 'perigo' %}border-red-500/30{% elif category == 'aviso' %}border-yellow-500/30{% else %}border-violet-500/30{% endif %}"
                    data-duration="3000">
                    
                    <!-- Barra de Progresso -->
                    <div class="absolute bottom-0 left-0 h-1 bg-gradient-to-r 
                        {% if category == 'sucesso' %}from-emerald-400 to-emerald-600
                        {% elif category == 'perigo' %}from-red-400 to-red-600
                        {% elif category == 'aviso' %}from-yellow-400 to-yellow-600
                        {% else %}from-violet-400 to-violet-600{% endif %}"
                        style="width: 100%; animation: progressBar 3s linear forwards;">
                    </div>
                    
                    <!-- Conteúdo -->
                    <div class="flex items-start space-x-3 relative z-10">
                        <!-- Ícone -->
                        <div class="flex-shrink-0 mt-0.5">
                            {% if category == 'sucesso' %}
                                <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            {% elif category == 'perigo' %}
                                <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
                                </svg>
                            {% elif category == 'aviso' %}
                                <svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                                </svg>
                            {% else %}
                                <svg class="w-5 h-5 text-violet-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12v-.008z" />
                                </svg>
                            {% endif %}
                        </div>
                        
                        <!-- Mensagem -->
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-white">{{ message }}</p>
                        </div>
                        
                        <!-- Botão Fechar -->
                        <button onclick="fecharFlash(this)" class="flex-shrink-0 text-purple-400 hover:text-white transition ml-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}

<script>
    // Função para fechar manualmente
    function fecharFlash(button) {
        const flash = button.closest('.flash-message');
        if (flash) {
            flash.classList.add('fechando');
            setTimeout(() => {
                if (flash.parentNode) {
                    flash.remove();
                    const container = document.getElementById('flash-container');
                    if (container && container.children.length === 0) {
                        container.remove();
                    }
                }
            }, 300);
        }
    }
    
    // Auto-fechar após o tempo determinado
    document.addEventListener('DOMContentLoaded', function() {
        const flashes = document.querySelectorAll('.flash-message');
        flashes.forEach(flash => {
            const duration = parseInt(flash.dataset.duration) || 3000;
            setTimeout(() => {
                if (flash.parentNode) {
                    flash.classList.add('fechando');
                    setTimeout(() => {
                        if (flash.parentNode) {
                            flash.remove();
                            const container = document.getElementById('flash-container');
                            if (container && container.children.length === 0) {
                                container.remove();
                            }
                        }
                    }, 300);
                }
            }, duration);
        });
    });
</script>
